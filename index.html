<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>星辰護理日誌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

/* ── 白底 × 溫潤薄荷綠 ── */
:root{
  --bg:#ffffff;
  --bg-tint:#f6faf7;
  --surface:#ffffff;
  --surface-2:#f2f7f4;
  --ink:#1f2a24;
  --ink-2:#4a5a52;
  --muted:#8b9a92;
  --rim:#e3ece7;
  --rim-2:#d4e0d9;

  --brand:#4A8F6B;
  --brand-deep:#377054;
  --brand-soft:#E8F3EC;
  --brand-tint:#f0f7f3;

  --accent:#8bb49a;
  --sand:#c8b98c;

  --danger:#c0553f;
  --danger-soft:#fbe9e3;
  --warn:#b07a25;
  --warn-soft:#fbefd5;
  --ok:#4A8F6B;
  --ok-soft:#E8F3EC;

  --shadow-xs:0 1px 2px rgba(20,40,30,.04);
  --shadow-sm:0 2px 6px -2px rgba(30,60,45,.08), 0 1px 2px rgba(30,60,45,.04);
  --shadow:0 8px 24px -12px rgba(30,60,45,.18), 0 2px 4px -2px rgba(30,60,45,.06);
  --radius:16px;
  --radius-lg:22px;
}

body{
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei','微軟正黑體',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  text-rendering:optimizeLegibility;
  word-break:keep-all;overflow-wrap:break-word;
}

.app{max-width:480px;margin:0 auto;min-height:100vh;background:transparent;position:relative;overflow-x:hidden;}

/* ── 頂部 ── */
.top-bar{
  padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:10;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--rim);
}
.brand{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:.02em}
.brand em{font-style:normal;color:var(--brand-deep);font-weight:700}
.cg-pill{
  font-size:12.5px;color:var(--brand-deep);cursor:pointer;
  padding:7px 14px;border:1px solid var(--rim-2);border-radius:999px;
  background:var(--brand-soft);font-weight:600;letter-spacing:.02em;
}
.cg-pill:active{transform:scale(.97)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#c5d1ca;display:inline-block;margin-right:4px;transition:background .3s;vertical-align:1px}
.sync-dot.online{background:var(--brand)}
.sync-dot.syncing{background:var(--sand);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 分頁 ── */
.tab-bar{
  display:flex;gap:4px;padding:8px;margin:10px 14px 4px;
  background:var(--surface-2);border-radius:14px;border:1px solid var(--rim);
}
.tab{
  flex:1;padding:10px 4px;text-align:center;font-size:13.5px;color:var(--muted);
  cursor:pointer;border-radius:10px;font-weight:600;letter-spacing:.02em;
  transition:all .15s;background:transparent;
}
.tab.active{color:var(--brand-deep);background:#fff;box-shadow:var(--shadow-xs);border:1px solid var(--rim)}

.pg{padding:12px 14px 40px}

/* ── 小節標題 ── 放大＋綠色強調橫槓 */
.sec{
  font-size:15px;font-weight:700;color:var(--ink);
  letter-spacing:.02em;
  margin:32px 2px 18px;
  display:flex;align-items:center;gap:10px;
}
.sec::before{
  content:'';width:4px;height:16px;border-radius:3px;
  background:var(--brand);
}
.sec:first-child{margin-top:10px}

/* ── 卡片 ── */
.fcard{
    background:var(--surface);border:1px solid var(--rim);
    border-radius:var(--radius-lg);padding:22px 22px 24px;margin-bottom:14px;
    box-shadow:var(--shadow-sm);overflow:hidden;
  }

/* ── 通用欄位列 ── */
.frow{display:grid;grid-template-columns:64px 1fr 40px;align-items:center;gap:12px;margin-bottom:12px}
.frow:last-of-type{margin-bottom:0}
.flbl{font-size:15px;color:var(--ink);text-align:right;font-weight:500;letter-spacing:.04em;padding-right:2px}
.frow input[type=number]{
    width:100%;height:50px;padding:0 20px;
    border:1px solid var(--rim-2);border-radius:16px;
    font-size:16px;background:var(--surface);color:var(--ink);
    text-align:right;-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
    font-family:inherit;font-weight:600;
    transition:all .15s;letter-spacing:.02em;
  }
.frow input[type=number]:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.frow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.funit{font-size:13px;color:var(--muted);font-weight:500;text-align:left;letter-spacing:.02em;margin-left:-4px}

/* ── 分隔線 ── */
.divider{border:none;border-top:1px solid var(--rim);margin:18px 0 24px}
.alert-divider{border:none;border-top:1px dashed rgba(0,0,0,.12);margin:8px 0}

/* ── 時間列：時間 input 縮短，現在按鈕右緣 = 牛奶 input 右緣 ── */
.trow{
    display:grid;grid-template-columns:64px 1fr 68px 40px;
    align-items:center;gap:12px;margin-bottom:0;
  }
.trow-pad{display:block}
.trow label{
    font-size:15px;color:var(--ink);font-weight:500;
    text-align:right;letter-spacing:.04em;padding-right:2px;
  }
.time-input,
  .trow input[type=text],
  .trow input[type=time]{
    width:100%;height:50px;padding:0 20px;
    border:1px solid var(--rim-2);border-radius:16px;
    font-size:16px;background:var(--surface);color:var(--ink);
    font-family:inherit;font-weight:600;
    cursor:pointer;text-align:center;letter-spacing:.04em;
    -webkit-appearance:none;appearance:none;
    transition:all .15s;
  }
.time-input:focus,.trow input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.now-btn{
    height:50px;padding:0;width:100%;font-size:14px;border-radius:16px;cursor:pointer;
    border:1px solid var(--rim-2);background:var(--brand-tint);
    color:var(--brand-deep);white-space:nowrap;font-family:inherit;font-weight:700;
    letter-spacing:.04em;transition:all .15s;
  }
  .now-btn:hover{background:var(--brand-soft)}
.now-btn:active{transform:scale(.96)}

/* ── 主要按鈕 ── */
.add-btn{
  width:100%;height:50px;border-radius:14px;
  font-size:15.5px;font-weight:700;cursor:pointer;margin-top:24px;
  background:var(--brand);color:#fff;border:none;
  letter-spacing:.06em;font-family:inherit;
  box-shadow:0 6px 16px -8px rgba(74,143,107,.5);
  transition:transform .1s, background .15s;
}
.add-btn:hover{background:var(--brand-deep)}
.add-btn:active{transform:translateY(1px)}

/* ── 記錄列表 ── */
.rec-list{display:flex;flex-direction:column;gap:9px}
.rec-in,.rec-out,.rec-vt{
  border-radius:14px;padding:13px 15px 13px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  background:var(--surface);border:1px solid var(--rim);
  box-shadow:var(--shadow-xs);position:relative;
}
.rec-in::before,.rec-out::before,.rec-vt::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;
}
.rec-in{background:linear-gradient(180deg,#fff,#f4f7fa 100%);border-color:#dce6ee}
.rec-out{background:linear-gradient(180deg,#fff,#fbf5ea 100%);border-color:#eadfc7}
.rec-vt{background:linear-gradient(180deg,#fff,#f5f3ea 100%);border-color:#e5e0cc}
.rec-in::before{background:#3E6B8A}
.rec-out::before{background:#B08248}
.rec-vt::before{background:#9e967b}
.rec-in .rec-time{color:#264a65}
.rec-out .rec-time{color:#7a5723}
.rec-in .rv-val,.rec-out .rv-val,.rec-vt .rv-val{color:inherit}
.rec-in .rv-sub{color:#3E6B8A}
.rec-out .rv-lbl,.rec-in .rv-lbl{color:inherit;opacity:.65}

.rec-left{flex-shrink:0;min-width:58px}
.rec-time{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;letter-spacing:.02em}
.rec-cg{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.rec-right{flex:1;text-align:right}
.rec-del{
  color:var(--muted);cursor:pointer;font-size:20px;line-height:1;
  padding:2px 6px;flex-shrink:0;margin-top:-2px;
  border-radius:8px;transition:all .15s;
}
.rec-del:active{background:var(--danger-soft);color:var(--danger)}

.rv-row{display:flex;justify-content:flex-end;align-items:baseline;gap:6px;line-height:1.9;flex-wrap:wrap}
.rv-pair{display:flex;align-items:baseline;gap:3px}
.rv-lbl{font-size:11.5px;color:var(--muted);white-space:nowrap;font-weight:600}
.rv-val{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums}
.rv-val.alert{color:var(--danger)}
.rv-unit{font-size:11.5px;color:var(--muted);white-space:nowrap}
.rv-sep{font-size:11px;color:var(--rim-2)}
.rv-sub{font-size:11.5px;color:var(--brand-deep);margin-top:3px;text-align:right;font-weight:600}

/* ── 小計 ── */
.subtotal{
  background:var(--brand-tint);border:1px solid var(--rim);
  border-radius:var(--radius);padding:14px 16px;margin-top:12px;
}
.subtotal-title{font-size:12px;font-weight:700;color:var(--brand-deep);margin-bottom:10px;letter-spacing:.06em}
.st-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st-item{font-size:13px;color:var(--ink);padding:12px 14px;border-radius:12px;background:#fff;border:1px solid var(--rim)}
.st-item strong{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--brand-deep)}
.st-item small{font-size:11.5px;color:var(--muted);font-weight:600}
.st-diff{
  grid-column:1/-1;font-size:14px;font-weight:700;margin-top:8px;
  padding:11px 14px;border-radius:12px;background:#fff;text-align:center;border:1px solid var(--rim);
}
.diff-pos{color:var(--brand-deep)}
.diff-neg{color:var(--danger)}

/* ── 統計卡 ── */
.sum-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:48px}
.sum-card{
  background:var(--surface);border:1px solid var(--rim);
  border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-xs);
}
.sum-card .sl{font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.06em}
.sum-card .sv{font-size:24px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.sum-card .su{font-size:12px;color:var(--muted);font-weight:600}
.sum-card.full-col{grid-column:1/-1;background:var(--brand-tint);border-color:var(--rim-2)}
.full-col{grid-column:1/-1}

/* ── 提醒 ── */
.alert-box{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;border:1px solid}
.alert-ok{background:var(--ok-soft);border-color:#c7e0d1}
.alert-ok .at{color:var(--brand-deep);font-size:13.5px;font-weight:700;margin-bottom:5px;letter-spacing:.02em}
.alert-ok .ab{color:var(--brand-deep);font-size:13px;line-height:1.7}
.alert-warn{background:var(--warn-soft);border-color:#ecd29d}
.alert-warn .at{color:#7a4f11;font-size:13.5px;font-weight:700;margin-bottom:5px}
.alert-warn .ab{color:#7a4f11;font-size:13px;line-height:1.7}
.alert-danger{background:var(--danger-soft);border-color:#efc1b2}
.alert-danger .at{color:#7a2a1a;font-size:13.5px;font-weight:700;margin-bottom:5px}
.alert-danger .ab{color:#7a2a1a;font-size:13px;line-height:1.7}

/* ── 圖表分頁 ── */
.chart-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ct{
  padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface);color:var(--ink-2);
  font-family:inherit;font-weight:600;transition:all .15s;
}
.ct.active{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 4px 10px -4px rgba(74,143,107,.4)}
.ct.range-active{background:var(--ink);color:#fff;border-color:transparent}
.ct:active{transform:scale(.96)}

.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.date-nav button{
  padding:9px 14px;border-radius:12px;cursor:pointer;font-size:13px;
  border:1px solid var(--rim-2);background:var(--surface);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.date-nav span{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--ink)}
.date-nav button:disabled{opacity:.4;cursor:default}

.export-btn{
  width:100%;height:48px;border-radius:14px;font-size:14px;cursor:pointer;
  margin-top:14px;border:1px solid var(--rim-2);
  background:var(--surface);color:var(--ink);font-weight:700;font-family:inherit;
}
.export-btn:active{transform:translateY(1px)}

.empty{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;font-weight:500}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(20,40,30,.38);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-box{
  background:var(--surface);border-radius:22px;padding:24px;
  width:100%;max-width:340px;
  box-shadow:0 30px 60px -24px rgba(0,0,0,.3), 0 0 0 1px var(--rim);
}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.modal-box input[type=text]{
  width:100%;height:46px;padding:0 14px;border:1px solid var(--rim-2);border-radius:12px;
  font-size:16px;margin-bottom:12px;background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:500;
}
.modal-box input[type=text]:focus{outline:none;border-color:var(--brand);background:#fff}
.qnames{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.qn{
  padding:9px 18px;border-radius:999px;font-size:14px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.qn:active{background:var(--brand);color:#fff;border-color:transparent}
.modal-ok{
  width:100%;height:48px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;border:none;font-family:inherit;
  box-shadow:0 4px 12px -4px rgba(74,143,107,.4);
}
.toast-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:10px}
.toast-body{font-size:13.5px;color:var(--ink-2);line-height:1.9;margin-bottom:18px}
.toast-ok{
  width:100%;height:48px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;border:none;font-family:inherit;
}
.confirm-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px}
.confirm-body{font-size:13.5px;color:var(--ink-2);margin-bottom:20px;line-height:1.7}
.confirm-btns{display:flex;gap:10px}
.confirm-btns .c-cancel{
  flex:1;height:46px;border-radius:12px;font-size:14px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.confirm-btns .c-del{
  flex:1;height:46px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;
  background:var(--danger);color:#fff;border:none;font-family:inherit;
  box-shadow:0 4px 12px -4px rgba(192,85,63,.4);
}

/* ── 時間選擇器 Modal ── */
.time-modal{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--surface);
  border-radius:24px 24px 0 0;padding:24px 20px 36px;
  box-shadow:0 -10px 40px rgba(20,40,30,.15);z-index:200;
  border-top:1px solid var(--rim);
}
.time-modal h4{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:20px;text-align:center;letter-spacing:.04em}
.time-ampm-row{display:flex;gap:10px;margin-bottom:18px}
.time-ampm-btn{
  flex:1;height:52px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink-2);
  font-family:inherit;letter-spacing:.04em;
}
.time-ampm-btn.sel-active{
  background:var(--brand);color:#fff;border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(74,143,107,.45);
}
.time-hm-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.time-hm-row input{
  flex:1;height:64px;padding:0 14px;border:1px solid var(--rim-2);border-radius:14px;
  font-size:16px;font-weight:700;text-align:center;
  background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-variant-numeric:tabular-nums;
  -webkit-appearance:none;-moz-appearance:textfield;appearance:none;
}
.time-hm-row input::-webkit-inner-spin-button,
.time-hm-row input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.time-hm-row input:focus{outline:none;border-color:var(--brand);background:#fff}
.time-hm-row span{font-size:24px;font-weight:700;color:var(--muted)}
.time-modal .time-ok{
  width:100%;height:50px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;border:none;font-family:inherit;letter-spacing:.06em;
  box-shadow:0 6px 16px -8px rgba(74,143,107,.5);
}
.time-modal-bg{position:fixed;inset:0;background:rgba(20,40,30,.38);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:199}

.loading{text-align:center;padding:48px 0;color:var(--muted);font-size:14px;font-weight:500}

/* ── 大便選項：方案 2（獨立 pill 按鈕，無灰底容器） ── */
.stool-row{display:grid;grid-template-columns:64px 1fr 40px;align-items:center;gap:12px;margin-top:24px;margin-bottom:14px}
.stool-row .flbl{grid-row:1/3;align-self:center}
.stool-row .stool-stack{grid-column:2/3;display:flex;flex-direction:column;gap:10px}
.stool-seg{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.stool-seg .sel-btn{
  height:44px;border:1px solid var(--rim-2);background:var(--surface);
  border-radius:12px;font-size:15px;color:var(--ink-2);font-weight:600;cursor:pointer;
  font-family:inherit;letter-spacing:.04em;transition:all .15s;
}
.stool-seg .sel-btn.selected{
  background:var(--brand);color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 10px -4px rgba(74,143,107,.4);
}
.sel-btn{
    height:50px;border-radius:16px;font-size:15px;cursor:pointer;
    border:1px solid var(--rim-2);background:var(--surface);color:var(--ink-2);
    font-family:inherit;font-weight:600;transition:all .15s;letter-spacing:.04em;
  }
.sel-btn.selected{
  background:var(--brand);color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 12px -4px rgba(74,143,107,.45);
}
.sel-btn:active{transform:scale(.97)}

.ampm-btn{
  height:44px;padding:0 14px;border-radius:12px;font-size:13px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink-2);
  font-weight:700;white-space:nowrap;min-width:56px;font-family:inherit;letter-spacing:.04em;
}
.ampm-btn.pm{background:var(--brand-soft);color:var(--brand-deep);border-color:var(--rim-2)}

/* ── 生理狀態記錄：三欄並排 ── */
.vt-cols{display:flex;align-items:center;gap:10px;justify-content:flex-end;flex:1;flex-wrap:wrap;}
.vt-col{text-align:center;flex-shrink:0;}
.vt-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px;letter-spacing:.04em;}
.vt-val{font-size:15px;font-weight:700;color:var(--ink);}
.vt-val.alert{color:var(--danger);}
.vt-unit{font-size:10px;color:var(--muted);font-weight:500;}
.vt-sep{width:1px;height:28px;background:var(--rim);flex-shrink:0;}
</style>
</head>
<body>

function t(s){
  if(typeof s !== 'string') return s;
  if(cgName !== '玉珍') return s;
  // 逐詞替換
  let result = s;
  for(const [tw, cn] of Object.entries(ZH_TW_TO_CN)){
    result = result.split(tw).join(cn);
  }
  return result;
}

window.selStool=function(group, val){

    ['多','中','少'].forEach(v=>{
      const b=document.getElementById('sq-'+v);
      if(b) b.className='sel-btn'+(stoolQty===v?' selected':'');
    });
  }else{
    stoolType = stoolType===val ? '' : val;
    ['成形','軟便','水便'].forEach(v=>{
      const b=document.getElementById('st-'+v);
      if(b) b.className='sel-btn'+(stoolType===v?' selected':'');
    });
  }
};

// ── AM/PM 輔助函數 ──
// 把 input[type=time] 的值（24h）轉成 AM/PM 標籤
window.getAmPmLabel=function(id){
  const input=document.getElementById(id);
  if(!input||!input.value) return 'AM';
  const h=parseInt(input.value.split(':')[0]);
  return h<12?'AM':'PM';
};
// 切換 AM/PM
window.toggleAmPm=function(id){
  const input=document.getElementById(id);
  if(!input||!input.value) return;
  let [h,m]=input.value.split(':').map(Number);
  if(h<12) h+=12; else h-=12;
  if(h<0) h=0; if(h>23) h=23;
  input.value=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  const btn=document.getElementById(id+'-ampm');
  if(btn){btn.textContent=h<12?'AM':'PM';btn.className='ampm-btn'+(h>=12?' pm':'');}
};
// 設定為現在時間

window.openTimePicker=function(id){
  const hidden=document.getElementById(id);
  const display=document.getElementById(id+'-display');
  const curVal=(hidden&&hidden.value)||new Date().toTimeString().slice(0,5);
  const parts=curVal.split(':');
  let h=parseInt(parts[0])||0, m=parseInt(parts[1])||0;
  const isAm=h<12;
  const h12=h===0?12:h>12?h-12:h;
  const bg=document.createElement('div');
  bg.className='time-modal-bg';
  bg.onclick=()=>{bg.remove();if(document.querySelector('.time-modal'))document.querySelector('.time-modal').remove();};
  const modal=document.createElement('div');
  modal.className='time-modal';
  modal.innerHTML=
    '<h4>'+t('選擇時間')+'</h4>'+
    '<div class="time-ampm-row">'+
      '<button class="time-ampm-btn'+(isAm?' sel-active':'')+'" id="tp-am" onclick="window._tpSetAm(true)">'+t('上午')+'</button>'+
      '<button class="time-ampm-btn'+(!isAm?' sel-active':'')+'" id="tp-pm" onclick="window._tpSetAm(false)">'+t('下午')+'</button>'+
    '</div>'+
    '<div class="time-hm-row">'+
      '<input type="number" id="tp-h" min="1" max="12" value="'+h12+'"/>'+
      '<span>:</span>'+
      '<input type="number" id="tp-m" min="0" max="59" value="'+String(m).padStart(2,'0')+'"/>'+
    '</div>'+
    '<button class="time-ok" onclick="window._tpConfirm(\''+id+'\')">'+t('確認')+'</button>';
  window._tpIsAm=isAm;
  window._tpSetAm=function(am){
    window._tpIsAm=am;
    const a=document.getElementById('tp-am'),p=document.getElementById('tp-pm');
    if(a)a.className='time-ampm-btn'+(am?' sel-active':'');
    if(p)p.className='time-ampm-btn'+(!am?' sel-active':'');
  };
  window._tpConfirm=function(targetId){
    let hv=parseInt(document.getElementById('tp-h').value)||12;
    const mv=parseInt(document.getElementById('tp-m').value)||0;
    if(hv<1)hv=1;if(hv>12)hv=12;
    const h24=window._tpIsAm?(hv===12?0:hv):(hv===12?12:hv+12);
    const timeStr=String(h24).padStart(2,'0')+':'+String(mv).padStart(2,'0');
    const he=document.getElementById(targetId);
    const de=document.getElementById(targetId+'-display');
    if(he)he.value=timeStr;
    if(de)de.value=fmt12(timeStr);
    bg.remove();modal.remove();
  };
  document.body.appendChild(bg);
  document.body.appendChild(modal);
};

window.setNow=function(id){

  if(display) display.value=fmt12(now);
};

const QN=['明治','玉珍','溎珍','星宇','淑慧'];
const MW=0.8;
const milkW=ml=>Math.round(ml*MW);
const dk=(d)=>{const t=d||new Date();return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`};
const nt=()=>new Date().toTimeString().slice(0,5);
function fmt12(val24){
  if(!val24) return '';
  const [hh,mm]=val24.split(':');
  let h=parseInt(hh),m=parseInt(mm)||0;
  const ampm=h<12?t('上午'):t('下午');
  if(h===0)h=12; else if(h>12)h-=12;
  return ampm+' '+h+':'+(m<10?'0':'')+m;
}
function dkFmt(dateStr){
  // 把 "2026-04-22" 轉成 "04/22 (三)"
  if(!dateStr) return '';
  const [y,mo,d]=dateStr.split('-');
  const dt=new Date(parseInt(y),parseInt(mo)-1,parseInt(d));
  const wdays=['日','一','二','三','四','五','六'];
  return mo+'/'+d+' ('+wdays[dt.getDay()]+')';
}
function cycleStart(){const n=new Date(),s=new Date(n);if(n.getHours()<7)s.setDate(s.getDate()-1);s.setHours(7,0,0,0);return s;}
function r2d(r){const[h,m]=r.time.split(':');const[y,mo,d]=r.date.split('-');return new Date(y,mo-1,d,h,m);}
function sortT(arr){return[...arr].sort((a,b)=>r2d(a)-r2d(b));}
function el(id){return document.getElementById(id);}
const C=()=>el('content');
const M=()=>el('modal-container');

function tempAlert(v){return v!=null&&v>37.5;}
function sbpAlert(v){return v!=null&&(v>120||v<90);}
function dbpAlert(v){return v!=null&&(v>80||v<60);}
function pulseAlert(v){return v!=null&&(v>100||v<60);}
function ac(f){return f?'alert':'';}

function setSyncDot(state){
  const d=el('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(state==='online'?' online':state==='syncing'?' syncing':'');
}

// ── Firestore 即時監聽 ──
// 從 localStorage 讀取本機照顧者名字
cgName = localStorage.getItem('xc_cgName') || '';

// 超時診斷：5 秒沒收到回應就顯示提示
const _connTimeout = setTimeout(()=>{
  if(el('content').innerHTML.includes('連線中')){
    el('content').innerHTML=`<div style="padding:24px 16px;color:#666;font-size:14px;line-height:1.8">
      <div style="font-size:16px;font-weight:600;color:#cc0000;margin-bottom:12px">連線失敗</div>
      <div>可能原因：</div>
      <div>① Firebase 安全性規則已到期</div>
      <div>② 此網域未在 Firebase 授權清單中</div>
      <div style="margin-top:12px;font-size:12px;color:#999">請至 Firebase Console 確認 Firestore 規則，
      或至 Authentication → Settings → 授權網域 加入 Netlify 網址</div>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#185FA5;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">重新連線</button>
    </div>`;
  }
}, 5000);

onSnapshot(DOC_REF, (snap) => {
  clearTimeout(_connTimeout);
  if(snap.exists()){
    const data=snap.data();
    ioRecs=data.ioRecs||[];
    vtRecs=data.vtRecs||[];
    // cgName 只從 localStorage 讀，不從雲端同步，每個裝置各自記住自己的名字
  }else{
    ioRecs=[]; vtRecs=[];
  }
  setSyncDot('online');
  viewDate=viewDate||dk();
  el('cg-pill').textContent=cgName||t('設定名字');
  if(!cgName){ window.showNameModal(); return; }
  render();
}, (err)=>{
  clearTimeout(_connTimeout);
  setSyncDot('');
  console.error('Firestore error:', err);
  const code = err.code || '';
  let msg = '連線錯誤';
  if(code==='permission-denied') msg='Firebase 安全性規則拒絕存取，請至 Firestore Console 更新規則為測試模式';
  else if(code==='unavailable') msg='Firebase 服務暫時無法使用，請稍後重試';
  else msg=`連線錯誤：${code || err.message}`;
  el('content').innerHTML=`<div style="padding:24px 16px;color:#666;font-size:14px;line-height:1.8">
    <div style="font-size:16px;font-weight:600;color:#cc0000;margin-bottom:12px">連線失敗</div>
    <div>${msg}</div>
    <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#185FA5;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">重新連線</button>
  </div>`;
});

  setSyncDot('syncing');
  try{
    await setDoc(DOC_REF,{ioRecs,vtRecs},{merge:true});
    setSyncDot('online');
  }catch(e){
    setSyncDot('');
    alert(t('儲存失敗，請確認網路連線'));

}

function calcTotals(recs){
  let inW=0,outW=0;
  recs.forEach(r=>{
    if(r.t==='in')inW+=milkW(r.milk||0)+(r.mw||0);
    if(r.t==='out')outW+=(r.urine||0);
  });
  return{inW,outW,diff:inW-outW};
}

function buildIORecHTML(r,showDel){
  const cls=r.t==='in'?'rec-in':'rec-out';
  const delBtn=showDel?`<span class="rec-del" onclick="window.confirmDelIO('${r.id}')">×</span>`:'';
  let rightHTML='';
  if(r.t==='in'){
    const wTotal=milkW(r.milk||0)+(r.mw||0);
    const parts=[];
    if(r.milk)parts.push(`<span class="rv-pair"><span class="rv-lbl">${t('牛奶')}</span><span class="rv-val">${r.milk}</span><span class="rv-unit">cc</span></span>`);
    if(r.mw)parts.push(`<span class="rv-pair"><span class="rv-lbl">${t('藥＋水')}</span><span class="rv-val">${r.mw}</span><span class="rv-unit">cc</span></span>`);
    rightHTML=`<div class="rv-row">${parts.join('<span class="rv-sep">｜</span>')}</div><div class="rv-sub">${t('水分')} ${wTotal} cc</div>`;
  }else{
    const parts=[];
    if(r.urine)parts.push(`<span class="rv-pair"><span class="rv-lbl">${t('尿液')}</span><span class="rv-val">${r.urine}</span><span class="rv-unit">cc</span></span>`);
    if(r.stool)parts.push(`<span class="rv-pair"><span class="rv-lbl">${t('大便')}</span><span class="rv-val" style="font-size:12px">${r.stool}</span></span>`);
    rightHTML=`<div class="rv-row">${parts.join('<span class="rv-sep">｜</span>')}</div>`;
  }
  return`<div class="${cls}"><div class="rec-left"><div class="rec-time">${r.time}</div><div class="rec-cg">${r.cg||''}</div></div><div class="rec-right">${rightHTML}</div>${delBtn}</div>`;
}

function buildVTRecHTML(r,showDel){

// ── 解便監測 ──
function getStoolInfo(){
  const now=new Date();
  // 找所有解便紀錄（全歷史，跨日）
  const allStoolRecs=sortT(ioRecs.filter(r=>r.t==='out'&&r.stool&&r2d(r)<=now));
  if(!allStoolRecs.length) return{totalHrs:0,hrs:0,days:0,mins:0,label:'尚無解便紀錄',lastTwo:[],level:'ok'};
  const lastRec=allStoolRecs[allStoolRecs.length-1];
  const lastTime=r2d(lastRec);
  const sinceMs=now-lastTime;
  const totalHrs=Math.floor(sinceMs/3600000);
  const days=Math.floor(totalHrs/24);
  const hrs=totalHrs%24;
  const mins=Math.floor((sinceMs%3600000)/60000);
  // 日期標示
  const dateStr=lastRec.date===dk()?'':lastRec.date.slice(5)+' ';
  let label='';
  if(days>0) label=`距上次解便（${dateStr}${lastRec.time}）已 ${days} 天 ${hrs} 小時`;
  else label=`距上次解便（${dateStr}${lastRec.time}）已 ${hrs} 小時 ${mins} 分`;
  // 最近兩筆
  const lastTwo=allStoolRecs.slice(-2).reverse();
  // 第3天（72小時）變紅
  // 超過 48 小時直接紅色警示
  const level=totalHrs>=48?'danger':'ok';
  return{totalHrs,days,hrs,mins,label,lastTwo,level};
}

function buildStoolAlert(){
  const si=getStoolInfo();
  const aC=si.level==='danger'?'alert-danger':si.level==='warn'?'alert-warn':'alert-ok';
  const aI=si.level==='danger'?'警告：':si.level==='warn'?'提醒：':'';
  const lastTwoHTML=si.lastTwo.map(r=>{
    const dStr=r.date===dk()?'':r.date.slice(5)+' ';
    return `<div class="ab">${dStr}${r.time}　${r.stool}</div>`;
  }).join('');
  return `<div class="alert-box ${aC}" style="margin-bottom:48px">
    <div class="at">${aI}解便紀錄</div>
    <div class="ab">${si.label}</div>
    ${si.lastTwo.length?`<hr class="alert-divider"/><div class="ab" style="font-size:11px;opacity:0.8;margin-bottom:3px">最近兩次：</div>${lastTwoHTML}`:''}
  </div>`;
}

// ── TAB 3 ──
function getUA(){
  const now=new Date(),cs=cycleStart();
  // 解尿：搜尋所有歷史紀錄（跨日），找最近一次
  const allUrineRecs=sortT(ioRecs.filter(r=>r.t==='out'&&r.urine&&r2d(r)<=now));
  // 排便：只看當日週期
  const sRecs=sortT(ioRecs.filter(r=>{if(r.t!=='out'||!r.stool)return false;const rt=r2d(r);return rt>=cs&&rt<=now;}));
  let lastT=null,sinceMs=0,label='';
  if(!allUrineRecs.length){
    lastT=cs; sinceMs=now-cs;
    label=t('尚無解尿紀錄（07:00 起算）');
  }else{
    const lastRec=allUrineRecs[allUrineRecs.length-1];
    lastT=r2d(lastRec); sinceMs=now-lastT;
    const dateStr=lastRec.date===dk()?'':lastRec.date.slice(5)+' ';
    label=`距上次解尿（${dateStr}${lastRec.time}）`;
  }
  const hrs=Math.floor(sinceMs/3600000),mins=Math.floor((sinceMs%3600000)/60000);
  const inAfter=ioRecs.filter(r=>{if(r.t!=='in')return false;const rt=r2d(r);return rt>=lastT&&rt<=now;}).reduce((s,r)=>s+milkW(r.milk||0)+(r.mw||0),0);
  return{hrs,mins,inAfter,label,level:hrs>=8?'danger':hrs>=6?'warn':'ok',sRecs};
}

        {label:'低壓',data:db,borderColor:'#BA7517',tension:0.3,spanGaps:true,borderDash:[5,3],pointStyle:'rect'}
      ];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30;display:inline-block"></span>${t('高壓(mmHg)')}</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#BA7517;display:inline-block"></span>${t('低壓(mmHg)')}</span>`;
    }else if(chartType==='temp'){
      const tD=last7.map(d=>{const rs=vtRecs.filter(r=>r.date===d&&r.temp!=null);return rs.length?parseFloat((rs.reduce((a,r)=>a+r.temp,0)/rs.length).toFixed(1)):null;});
      datasets=[{label:'體溫',data:tD,borderColor:'#7F77DD',backgroundColor:'rgba(127,119,221,0.1)',tension:0.3,spanGaps:true,fill:true,pointStyle:'circle'}];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#7F77DD;display:inline-block"></span>${t('體溫(°C)')}</span>`;
    }else{
      const pD=last7.map(d=>{const rs=vtRecs.filter(r=>r.date===d&&r.pulse!=null);return rs.length?Math.round(rs.reduce((a,r)=>a+r.pulse,0)/rs.length):null;});
      datasets=[{label:'脈搏',data:pD,borderColor:'#34c759',backgroundColor:'rgba(52,199,89,0.1)',tension:0.3,spanGaps:true,fill:true,pointStyle:'circle'}];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#34c759;display:inline-block"></span>${t('脈搏(次/分)')}</span>`;
    }
  }else{
    const hours=Array.from({length:24},(_,i)=>i);
    labels=hours.map(h=>h%3===0?String(h).padStart(2,'0'):'');
    if(chartType==='io'){
      const inD=hours.map(h=>ioRecs.filter(r=>r.date===today&&r.t==='in'&&parseInt(r.time.split(':')[0])===h).reduce((s,r)=>s+milkW(r.milk||0)+(r.mw||0),0));
      const outD=hours.map(h=>ioRecs.filter(r=>r.date===today&&r.t==='out'&&parseInt(r.time.split(':')[0])===h).reduce((s,r)=>s+(r.urine||0),0));
      datasets=[
        {label:'輸入水分',data:inD,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.12)',tension:0.2,fill:true,pointRadius:3,pointStyle:'circle'},
        {label:'輸出尿液',data:outD,borderColor:'#ff3b30',backgroundColor:'rgba(255,59,48,0.08)',tension:0.2,fill:true,pointRadius:3,borderDash:[4,3],pointStyle:'rect'}
      ];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#185FA5;display:inline-block"></span>${t('輸入水分(cc)')}</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#ff3b30;display:inline-block"></span>${t('輸出尿液(cc)')}</span>`;
    }else if(chartType==='bp'){
      const s=hours.map(h=>{const rs=vtRecs.filter(r=>r.date===today&&r.sbp!=null&&parseInt(r.time.split(':')[0])===h);return rs.length?Math.round(rs.reduce((a,r)=>a+r.sbp,0)/rs.length):null;});
      const db=hours.map(h=>{const rs=vtRecs.filter(r=>r.date===today&&r.dbp!=null&&parseInt(r.time.split(':')[0])===h);return rs.length?Math.round(rs.reduce((a,r)=>a+r.dbp,0)/rs.length):null;});
      datasets=[
        {label:'高壓',data:s,borderColor:'#D85A30',tension:0.2,spanGaps:true,pointRadius:4,pointStyle:'circle'},
        {label:'低壓',data:db,borderColor:'#BA7517',tension:0.2,spanGaps:true,pointRadius:4,borderDash:[4,3],pointStyle:'rect'}
      ];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30;display:inline-block"></span>${t('高壓(mmHg)')}</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#BA7517;display:inline-block"></span>${t('低壓(mmHg)')}</span>`;
    }else if(chartType==='temp'){
      const tD=hours.map(h=>{const rs=vtRecs.filter(r=>r.date===today&&r.temp!=null&&parseInt(r.time.split(':')[0])===h);return rs.length?parseFloat((rs.reduce((a,r)=>a+r.temp,0)/rs.length).toFixed(1)):null;});
      datasets=[{label:'體溫',data:tD,borderColor:'#7F77DD',backgroundColor:'rgba(127,119,221,0.1)',tension:0.2,spanGaps:true,fill:true,pointRadius:4,pointStyle:'circle'}];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#7F77DD;display:inline-block"></span>${t('體溫(°C)')}</span>`;
    }else{
      const pD=hours.map(h=>{const rs=vtRecs.filter(r=>r.date===today&&r.pulse!=null&&parseInt(r.time.split(':')[0])===h);return rs.length?Math.round(rs.reduce((a,r)=>a+r.pulse,0)/rs.length):null;});
      datasets=[{label:'脈搏',data:pD,borderColor:'#34c759',backgroundColor:'rgba(52,199,89,0.1)',tension:0.2,spanGaps:true,fill:true,pointRadius:4,pointStyle:'circle'}];
      leg=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#34c759;display:inline-block"></span>${t('脈搏(次/分)')}</span>`;
    }
  }
  const legEl=el('cleg');if(legEl)legEl.innerHTML=leg;
  const Chart=window.Chart;
  if(!Chart){setTimeout(()=>drawChart(),200);return;}
  chartInst=new Chart(canvas,{
    type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:10},autoSkip:false,maxRotation:0},grid:{display:false}},
        y:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}
      }
    }
  });
}

window.exportReport=function(){
  const today=dk();
  const ua=getUA();
  const cs=cycleStart(),now=new Date();
  const cyc=ioRecs.filter(r=>{const rt=r2d(r);return rt>=cs&&rt<=now;});
  const{inW,outW,diff}=calcTotals(cyc);
  const div=document.createElement('div');
  div.style.cssText='position:absolute;left:-9999px;top:0;width:440px;background:white;padding:28px;font-family:-apple-system,sans-serif;font-size:13px;color:#222';
  div.innerHTML=`<div style="font-size:20px;font-weight:700;margin-bottom:2px;color:#377054">星辰護理日誌</div>
  <div style="font-size:13px;color:#888;margin-bottom:20px">每日報告　${today}　產生時間：${now.toLocaleTimeString('zh-TW')}</div>
  <div style="margin-bottom:14px;padding:13px;background:#f5ecda;border-radius:12px;border:1px solid rgba(90,60,30,.12)">
    <div style="font-weight:600;margin-bottom:5px;color:#33271a">尿液監測</div>
    <div style="color:#33271a">${ua.label}　已 ${ua.hrs} 小時 ${ua.mins} 分</div>
    <div style="color:#33271a">此段時間輸入水分：${ua.inAfter} cc</div>
    ${ua.sRecs.map(r=>`<div style="color:#33271a">排便：${r.time}　${r.stool} g</div>`).join('')}
  </div>
  <div style="margin-bottom:14px;padding:13px;background:#f5ecda;border-radius:10px">
    <div style="font-weight:600;margin-bottom:5px">當日週期水分（07:00 起算）</div>
    <div>輸入水分：${inW} cc　　輸出（尿液）：${outW} cc　　差額：${diff>0?'+':''}${diff} cc</div>
  </div>
  <div style="font-weight:600;margin-bottom:7px">輸出入紀錄</div>
  ${sortT(ioRecs.filter(r=>r.date===today)).map(r=>{
    let d='';if(r.t==='in'){if(r.milk)d+=`牛奶 ${r.milk}cc（水分${milkW(r.milk)}cc）`;if(r.mw)d+=` 藥水 ${r.mw}cc`;}
    else{if(r.urine)d+=`尿液 ${r.urine}cc`;if(r.stool)d+=` 大便 ${r.stool}`;}
    return`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #eee;color:${r.t==='in'?'#185FA5':'#cc0000'}"><span>${r.time}　${r.cg||''}</span><span>${d.trim()||'—'}</span></div>`;
  }).join('')}
  <div style="font-weight:600;margin:16px 0 7px">生理狀態紀錄</div>
  ${sortT(vtRecs.filter(r=>r.date===today)).map(r=>{
    const ps=[];if(r.temp!=null)ps.push(`體溫 ${r.temp}°C`);if(r.sbp!=null&&r.dbp!=null)ps.push(`血壓 ${r.sbp}/${r.dbp}`);if(r.pulse!=null)ps.push(`脈搏 ${r.pulse}`);
    return`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #eee"><span>${r.time}　${r.cg||''}</span><span>${ps.join('　')}</span></div>`;
  }).join('')}
  <div style="margin-top:20px;font-size:11px;color:#bbb">本報告由星辰護理日誌自動產生</div>`;
  document.body.appendChild(div);
  if(!window.html2canvas){showToast(t('匯出失敗'),[t('請確認網路連線後重試。')]);document.body.removeChild(div);return;}
  window.html2canvas(div,{scale:2,backgroundColor:'#ffffff'}).then(canvas=>{
    document.body.removeChild(div);
    const url=canvas.toDataURL('image/jpeg',0.95);
    const a=document.createElement('a');a.href=url;a.download=`星辰護理日誌_${today}.jpg`;a.click();
    const w=window.open('','_blank');
    if(w){w.document.write(`<!DOCTYPE html><html><head><title>星辰護理日誌 ${today}</title><style>body{margin:0}img{width:100%}</style></head><body><img src="${url}"/><script>window.onload=function(){window.print()}<\/script></body></html>`);w.document.close();}
    showToast(t('匯出完成'),[t('JPG 已下載至您的裝置。'),t('列印視窗已開啟，可儲存為 PDF。'),t('請將檔案寄送至：')+'singyu0723@gmail.com']);
  }).catch(()=>{document.body.removeChild(div);showToast(t('匯出失敗'),[t('請稍後再試。')]);});
};
